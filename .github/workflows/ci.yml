name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew build --no-daemon
      
    - name: Run tests
      run: ./gradlew test --no-daemon
      
    - name: Generate test report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Test Results
        path: build/test-results/test/*.xml
        reporter: java-junit
        
    - name: Generate JaCoCo Badge
      id: jacoco
      uses: cicirello/jacoco-badge-generator@v2
      with:
        generate-branches-badge: true
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: build/reports/jacoco/test/jacocoTestReport.xml
        
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Check code formatting
      run: ./gradlew spotlessCheck --no-daemon
      
    - name: Run PMD
      run: ./gradlew pmdMain pmdTest --no-daemon
      continue-on-error: true
      
    - name: Run SpotBugs
      run: ./gradlew spotbugsMain --no-daemon
      continue-on-error: true
      
    - name: Run Checkstyle
      run: ./gradlew checkstyleMain --no-daemon
      continue-on-error: true
      
    - name: Upload PMD report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: pmd-report
        path: build/reports/pmd/
        
    - name: Upload SpotBugs report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: spotbugs-report
        path: build/reports/spotbugs/
        
    - name: Upload Checkstyle report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: checkstyle-report
        path: build/reports/checkstyle/
        
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: false
        tags: sensorbite:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Test Docker image
      run: |
        docker run -d --name sensorbite-test -p 8080:8080 sensorbite:latest
        sleep 30
        curl --fail http://localhost:8080/actuator/health || exit 1
        docker stop sensorbite-test
        
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
        
  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Check for dependency updates
      run: ./gradlew dependencyUpdates --no-daemon
      
    - name: Upload dependency report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: dependency-report
        path: build/dependencyUpdates/
