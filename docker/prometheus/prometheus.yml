# Prometheus configuration for Sensorbite

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'sensorbite-monitor'

scrape_configs:
  - job_name: 'sensorbite-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['sensorbite:8080']
        labels:
          application: 'sensorbite'
          environment: 'production'
    
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
